  <text x="880" y="152" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#54595d">Coverage:</text>
  <text x="980" y="152" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#202122">Remote, backcountry</text>
