  <!-- Article body -->
  <text x="228" y="192" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#202122">Overview</text>
  <text x="228" y="214" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#202122">Wilderness first aid (WFA) is the application of first aid techniques in remote locations where</text>
  <text x="228" y="232" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#202122">professional emergency services may be unavailable or significantly delayed. Practitioners must</text>
  <text x="228" y="250" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#202122">be prepared to manage patients for hours or days before evacuation to definitive care.</text>

  <text x="228" y="288" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#202122">Patient Assessment System</text>
  <text x="228" y="310" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#202122">The standard WFA approach begins with the STOP mnemonic, followed by the ABCDE survey:</text>
  <text x="244" y="334" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#202122">•  Stop — prevent additional injury to patient and rescuer</text>
  <text x="244" y="354" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#202122">•  Think — assess scene safety, mechanism of injury</text>
  <text x="244" y="374" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#202122">•  Observe — form general impression of patient condition</text>
  <text x="244" y="394" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#202122">•  Plan — determine resources, priorities, and evacuation urgency</text>
  <text x="228" y="420" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#202122">Followed by the primary survey: Airway, Breathing, Circulation, Disability, Expose/Environment.</text>

  <text x="228" y="456" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#202122">Hemorrhage Control</text>
  <text x="228" y="478" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#202122">Life-threatening bleeding must be controlled before any other treatment. In the wilderness setting,</text>
  <text x="228" y="496" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#202122">a tourniquet should be applied 2–3 inches proximal to the wound for extremity hemorrhage.</text>
  <text x="228" y="514" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#202122">Document the time of application. Wound packing with hemostatic gauze (Combat Gauze, QuikClot)</text>
  <text x="228" y="532" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#202122">is preferred for junctional wounds where tourniquet application is not possible.</text>

  <text x="228" y="566" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#202122">Wound Care &amp; Irrigation</text>
  <text x="228" y="588" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#202122">Wound irrigation is the most critical intervention for contaminated lacerations. Use at minimum</text>
  <text x="228" y="606" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#202122">1 liter of potable water under pressure. A 20 cc syringe with 19-gauge angiocath produces</text>
  <text x="228" y="624" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#202122">adequate pressure (~7 psi). Sterile saline is ideal; clean potable water is acceptable in the field.</text>

